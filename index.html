<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Analytics System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <h2>Customer Review Intelligence System</h2>
            <ul id="nav-menu">
                <li class="nav-item active" data-target="view-dashboard">Dashboard</li>
                <li class="nav-item" data-target="view-datatable">Data Table</li>
                <li class="nav-item" data-target="view-reports">Insights & Reports</li>
            </ul>
        </aside>

        <main class="main-content">
            <header>
                <h1 id="main-header">Dashboard</h1>
                <p>Real-time insights from customer feedback</p>
            </header>

          <div id="view-dashboard" class="tab-content active">
    <div class="kpi-cards">
        <div class="card"><h3>Total Reviews</h3><p id="kpi-total">--</p></div>
        <div class="card"><h3>Avg Rating</h3><p id="kpi-rating">--</p></div>
        <div class="card"><h3>Positive</h3><p id="kpi-positive" class="accent-green">--</p></div>
        <div class="card"><h3>Negative</h3><p id="kpi-negative" class="accent-red">--</p></div>
    </div>
    
    <section class="charts-container">
        <div class="chart-box">
            <h3>Sentiment</h3>
            <canvas id="sentimentChart"></canvas>
        </div>
        <div class="chart-box">
            <h3>Ratings</h3>
            <canvas id="ratingChart"></canvas> </div>
    </section>
</div>

            <div id="view-datatable" class="tab-content">
                <div class="table-controls">
                    <input type="text" id="searchInput" placeholder="Search reviews...">
                    <select id="sentimentFilter"><option value="All">All Sentiments</option><option value="Positive">Positive</option><option value="Negative">Negative</option></select>
                </div>
                <div class="data-table-container">
                    <div class="table-wrapper full-height">
                        <table id="full-reviews-table">
                            <thead><tr><th>Rating</th><th>Sentiment</th><th>Review Text</th></tr></thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div id="view-reports" class="tab-content">
                <div class="reports-grid">
                    <div class="insight-card full-width">
                        <h3>Most Frequent Keywords</h3>
                        <div id="keyword-container" class="keyword-tags"></div>
                    </div>
                    <div class="insight-card">
                        <h3>Sentiment Breakdown</h3>
                        <ul id="sentiment-breakdown-list" class="breakdown-list"></ul>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
